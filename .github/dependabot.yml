version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-tools:
        patterns:
          - "pytest*"
          - "ruff"
    ignore:
      # PyTorch stack is pinned to CPU/GPU indices in CI and locally; bump manually.
      - dependency-name: "torch"
      - dependency-name: "torchvision"
      - dependency-name: "torchaudio"
